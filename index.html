<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="header.css">
    <link rel="stylesheet" type="text/css" href="footer.css">
    <link rel="stylesheet" type="text/css" href="main.css">



    <title>2025/3/21测试</title>
    <style>
        #dateDisplay {
            font-size: 24px;
            font-weight: bold;
            color: beige;
        }
    </style>
</head>

<body id="backgroundContainer">
    <header>
        <!-- 计时器 -->
        <h1 id="top" style="color: blue;"><strong><i>
                    <div id="dateDisplay"></div>
                </i></strong></h1>

    </header>




    <main>
        <div id="output"></div>
        <div id="input-container">
            <input type="text" id="input-box" placeholder="请输入内容...">
            <button id="send-button">发送</button>
        </div>
    </main>












    <footer>
        <div id="foots">
            <button><a href="#top"> 回到顶部 </a></button>
        </div>
    </footer>
    <script>
        function updateDate() {
            const now = new Date();
            const utcOffset = now.getTimezoneOffset() * 60000; // 获取本地时间与UTC的偏移量
            const beijingTime = new Date(now.getTime() + utcOffset + 3600000 * 8); // 转换为北京时间（UTC+8）

            const options = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            const formattedDate = beijingTime.toLocaleString('zh-CN', options);

            document.getElementById('dateDisplay').textContent = formattedDate;
        }

        // 初始更新
        updateDate();

        // 每1000毫秒（1秒）更新一次
        setInterval(updateDate, 1000);




        // 定义API的URL和密钥
        const API_URL = "https://xj2025-github-io.onrender.com/api/chat"; // 替换为实际的API地址

        // 获取DOM元素
        const outputDiv = document.getElementById("output");
        const inputBox = document.getElementById("input-box");
        const sendButton = document.getElementById("send-button");

        async function sendRequest(userInput) {
    try {
        const response = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                userInput: userInput,  // 将用户输入发送到后端
            }),
        });

        if (!response.ok) {
            // 如果响应状态码不是 200，解析错误信息
            const errorData = await response.json();
            throw new Error(errorData.error || "Unknown error occurred");
        }

        const data = await response.json();
        return data.choices[0].message.content;  // 返回大模型的回复
    } catch (error) {
        // 捕获错误并显示在页面上
        document.getElementById("output").innerHTML += `<div><strong>错误：</strong>${error.message}</div>`;
        console.error("Error:", error);
        return null;
    }
}

        // 处理用户输入
        sendButton.addEventListener("click", async () => {
            const userInput = “我要玩原神”;
                //inputBox.value.trim();
            if (!userInput) {
                alert("请输入内容！");
                return;
            }

            // 清空输入框
            inputBox.value = "";

            // 显示用户输入
            outputDiv.innerHTML += `<div><strong>你：</strong>${userInput}</div>`;

            // 调用API并显示结果
            const responseText = await sendRequest(userInput);
            outputDiv.innerHTML += `<div><strong>d**k$eep：</strong>${responseText}</div>`;

            // 滚动到底部
            outputDiv.scrollTop = outputDiv.scrollHeight;
        });



    </script>
</body>

</html>
